name: .NET CI

on:
  push:
    branches:
      - main
  pull_request:

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_NOLOGO: true
  NUGET_XMLDOC_MODE: skip
  NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-slim
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v7.0.0
      - name: Setup .NET SDK # detected from global.json
        uses: actions/setup-dotnet@v5.4.0
      - name: Restore .NET tools
        run: dotnet tool restore
      - name: Add Problem Matcher for dotnet-format
        run: echo "::add-matcher::.github/dotnet-format.json"

      - name: Lint with dotnet-format
        run: |
          dotnet format style --verify-no-changes --verbosity detailed
          dotnet format analyzers --verify-no-changes --verbosity detailed

      - name: Format Check with csharpier
        run: dotnet csharpier check . --log-format msbuild

  test:
    name: Debug Build & Test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        framework: [net10.0, net7.0, net6.0]
        include:
          - os: windows-latest
            framework: net48
    permissions:
      contents: read
      id-token: write # to use OIDC

    steps:
      - uses: actions/checkout@v7.0.0
      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5.4.0
        with:
          dotnet-version: |
            10.x
            7.x
            6.x
          cache: true
          cache-dependency-path: Directory.Packages.props

      - name: Restore
        run: dotnet restore
      - name: Build
        run: dotnet build --no-restore
      - name: Test
        run: dotnet test --framework ${{ matrix.framework }} --no-build --coverage --coverage-output-format cobertura --coverage-output cobertura.xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7.0.0
        if: ${{ !cancelled() }}
        with:
          use_oidc: true
          flags: ${{ runner.os }},${{ matrix.framework }}
          disable_search: true
          files: "./test/Nogic.ThrowHelperExtensions.SourceGenerator.Tests/bin/Debug/${{ matrix.framework }}/TestResults/cobertura.xml"
